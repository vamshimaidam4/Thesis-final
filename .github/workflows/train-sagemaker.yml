name: Train on SageMaker

on:
  workflow_dispatch:
    inputs:
      instance_type:
        description: "SageMaker instance type"
        required: true
        default: "ml.g4dn.xlarge"
        type: choice
        options:
          - ml.g4dn.xlarge
          - ml.g5.xlarge
          - ml.p3.2xlarge
          - ml.m5.xlarge
      model:
        description: "Which model(s) to train"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - hmgs
          - bilstm
      epochs:
        description: "Number of epochs"
        required: true
        default: "3"
      train_samples:
        description: "Training samples (balanced across 3 classes)"
        required: true
        default: "10000"
      val_samples:
        description: "Validation samples"
        required: true
        default: "1000"
      hf_config:
        description: "Amazon Reviews 2023 subset"
        required: true
        default: "raw_review_All_Beauty"

env:
  AWS_REGION: us-east-1
  S3_BUCKET_NAME: deep-learning-sentiment-models

jobs:
  train:
    name: Launch SageMaker training job
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install launcher dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "sagemaker>=2.230" "boto3>=1.34"

      - name: Configure AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id=${AWS_ACCESS_KEY_ID}
          aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}
          EOF
          cat > ~/.aws/config <<EOF
          [default]
          region=${AWS_REGION}
          EOF
          aws sts get-caller-identity

      - name: Launch training
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          S3_BUCKET_NAME: ${{ env.S3_BUCKET_NAME }}
        run: |
          python aws/launch_sagemaker.py \
            --instance-type "${{ github.event.inputs.instance_type }}" \
            --model "${{ github.event.inputs.model }}" \
            --epochs "${{ github.event.inputs.epochs }}" \
            --train-samples "${{ github.event.inputs.train_samples }}" \
            --val-samples "${{ github.event.inputs.val_samples }}" \
            --hf-config "${{ github.event.inputs.hf_config }}"

      - name: Summary
        if: always()
        run: |
          echo "### SageMaker Training Job" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Instance: ${{ github.event.inputs.instance_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${{ github.event.inputs.model }}" >> $GITHUB_STEP_SUMMARY
          echo "- Epochs: ${{ github.event.inputs.epochs }}" >> $GITHUB_STEP_SUMMARY
          echo "- Samples: ${{ github.event.inputs.train_samples }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bucket: ${S3_BUCKET_NAME}/inference/current/" >> $GITHUB_STEP_SUMMARY
