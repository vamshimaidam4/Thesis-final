name: Deploy to AWS

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sentiment-analysis
  ECS_CLUSTER: sentiment-cluster
  ECS_SERVICE: sentiment-service
  ECS_TASK_FAMILY: sentiment-task

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR repository
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY 2>/dev/null || \
          aws ecr create-repository --repository-name $ECR_REPOSITORY --image-scanning-configuration scanOnPush=true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Setup ECS infrastructure
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest"

          # Get default VPC
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId" --output text)
          echo "VPC: $VPC_ID"

          # Get subnets
          SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=${VPC_ID}" --query "Subnets[*].SubnetId" --output text | tr '\t' ',')
          echo "Subnets: $SUBNETS"

          # Create security group if not exists
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=sentiment-sg" "Name=vpc-id,Values=${VPC_ID}" --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "None")
          if [ "$SG_ID" = "None" ] || [ -z "$SG_ID" ]; then
            SG_ID=$(aws ec2 create-security-group --group-name sentiment-sg --description "Sentiment Analysis SG" --vpc-id "$VPC_ID" --query "GroupId" --output text)
            aws ec2 authorize-security-group-ingress --group-id "$SG_ID" --protocol tcp --port 8000 --cidr 0.0.0.0/0
            aws ec2 authorize-security-group-ingress --group-id "$SG_ID" --protocol tcp --port 443 --cidr 0.0.0.0/0
            aws ec2 authorize-security-group-ingress --group-id "$SG_ID" --protocol tcp --port 80 --cidr 0.0.0.0/0
          fi
          echo "Security Group: $SG_ID"

          # Create ECS service-linked role
          aws iam create-service-linked-role --aws-service-name ecs.amazonaws.com 2>/dev/null || true
          sleep 10

          # Create ECS task execution role
          cat > /tmp/ecs-trust.json << 'EOF'
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": {"Service": "ecs-tasks.amazonaws.com"},
              "Action": "sts:AssumeRole"
            }]
          }
          EOF

          aws iam get-role --role-name ecsTaskExecutionRole 2>/dev/null || \
            aws iam create-role --role-name ecsTaskExecutionRole --assume-role-policy-document file:///tmp/ecs-trust.json
          aws iam attach-role-policy --role-name ecsTaskExecutionRole \
            --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy 2>/dev/null || true

          # Add CloudWatch Logs permissions
          cat > /tmp/logs-policy.json << 'LOGEOF'
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": [
                "logs:CreateLogGroup",
                "logs:CreateLogStream",
                "logs:PutLogEvents",
                "logs:DescribeLogStreams"
              ],
              "Resource": "arn:aws:logs:*:*:*"
            }]
          }
          LOGEOF
          aws iam put-role-policy --role-name ecsTaskExecutionRole \
            --policy-name CloudWatchLogsFullAccess \
            --policy-document file:///tmp/logs-policy.json 2>/dev/null || true

          # Pre-create the log group
          aws logs create-log-group --log-group-name /ecs/sentiment-analysis 2>/dev/null || true

          # Create ECS task role for S3 access
          aws iam get-role --role-name ecsTaskRole 2>/dev/null || \
            aws iam create-role --role-name ecsTaskRole --assume-role-policy-document file:///tmp/ecs-trust.json
          cat > /tmp/s3-policy.json << 'S3EOF'
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": ["s3:*"],
              "Resource": ["arn:aws:s3:::deep-learning-sentiment-models", "arn:aws:s3:::deep-learning-sentiment-models/*"]
            }]
          }
          S3EOF
          aws iam put-role-policy --role-name ecsTaskRole \
            --policy-name S3ModelAccess \
            --policy-document file:///tmp/s3-policy.json 2>/dev/null || true

          EXEC_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/ecsTaskExecutionRole"
          TASK_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/ecsTaskRole"

          # Create ECS cluster
          aws ecs describe-clusters --clusters $ECS_CLUSTER --query "clusters[?status=='ACTIVE'].clusterName" --output text | grep -q "$ECS_CLUSTER" || \
            aws ecs create-cluster --cluster-name $ECS_CLUSTER

          # Register task definition
          cat > /tmp/task-def.json << TASKEOF
          {
            "family": "${ECS_TASK_FAMILY}",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "1024",
            "memory": "3072",
            "executionRoleArn": "${EXEC_ROLE_ARN}",
            "taskRoleArn": "${TASK_ROLE_ARN}",
            "containerDefinitions": [{
              "name": "sentiment-app",
              "image": "${ECR_IMAGE}",
              "portMappings": [{"containerPort": 8000, "protocol": "tcp"}],
              "environment": [
                {"name": "DEVICE", "value": "cpu"},
                {"name": "MODEL_PATH", "value": "./models"},
                {"name": "AWS_DEFAULT_REGION", "value": "${AWS_REGION}"}
              ],
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/sentiment-analysis",
                  "awslogs-region": "${AWS_REGION}",
                  "awslogs-stream-prefix": "ecs",
                  "awslogs-create-group": "true"
                }
              },
              "healthCheck": {
                "command": ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"],
                "interval": 30,
                "timeout": 5,
                "retries": 3,
                "startPeriod": 60
              }
            }]
          }
          TASKEOF

          aws ecs register-task-definition --cli-input-json file:///tmp/task-def.json

          # Create ALB target group
          TG_ARN=$(aws elbv2 describe-target-groups --names sentiment-tg --query "TargetGroups[0].TargetGroupArn" --output text 2>/dev/null || echo "None")
          if [ "$TG_ARN" = "None" ] || [ -z "$TG_ARN" ]; then
            TG_ARN=$(aws elbv2 create-target-group \
              --name sentiment-tg \
              --protocol HTTP --port 8000 \
              --vpc-id "$VPC_ID" \
              --target-type ip \
              --health-check-path /api/health \
              --health-check-interval-seconds 30 \
              --healthy-threshold-count 2 \
              --unhealthy-threshold-count 5 \
              --query "TargetGroups[0].TargetGroupArn" --output text)
          fi
          echo "Target Group: $TG_ARN"

          # Create ALB
          FIRST_SUBNET=$(echo "$SUBNETS" | cut -d',' -f1)
          SECOND_SUBNET=$(echo "$SUBNETS" | cut -d',' -f2)

          ALB_ARN=$(aws elbv2 describe-load-balancers --names sentiment-alb --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null || echo "None")
          if [ "$ALB_ARN" = "None" ] || [ -z "$ALB_ARN" ]; then
            ALB_ARN=$(aws elbv2 create-load-balancer \
              --name sentiment-alb \
              --subnets $FIRST_SUBNET $SECOND_SUBNET \
              --security-groups $SG_ID \
              --scheme internet-facing \
              --type application \
              --query "LoadBalancers[0].LoadBalancerArn" --output text)
            echo "Waiting for ALB to be active..."
            aws elbv2 wait load-balancer-available --load-balancer-arns "$ALB_ARN"
          fi
          ALB_DNS=$(aws elbv2 describe-load-balancers --load-balancer-arns "$ALB_ARN" --query "LoadBalancers[0].DNSName" --output text)
          echo "ALB DNS: $ALB_DNS"

          # Create listener
          LISTENER=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" --query "Listeners[0].ListenerArn" --output text 2>/dev/null || echo "None")
          if [ "$LISTENER" = "None" ] || [ -z "$LISTENER" ]; then
            aws elbv2 create-listener \
              --load-balancer-arn "$ALB_ARN" \
              --protocol HTTP --port 80 \
              --default-actions Type=forward,TargetGroupArn=$TG_ARN
          fi

          # Check if service has ALB attached
          SERVICE_LB=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query "services[?status=='ACTIVE'].loadBalancers[0].targetGroupArn" --output text 2>/dev/null || echo "None")
          SERVICE_EXISTS=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query "services[?status=='ACTIVE'].serviceName" --output text 2>/dev/null || echo "")

          if [ -n "$SERVICE_EXISTS" ] && { [ "$SERVICE_LB" = "None" ] || [ -z "$SERVICE_LB" ]; }; then
            echo "Service exists without ALB — deleting to recreate with ALB..."
            aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --desired-count 0 > /dev/null
            sleep 15
            aws ecs delete-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force > /dev/null
            echo "Waiting for service to fully drain..."
            for i in $(seq 1 30); do
              SVC_STATUS=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query "services[0].status" --output text 2>/dev/null || echo "GONE")
              echo "  [$i] Service status: $SVC_STATUS"
              if [ "$SVC_STATUS" = "INACTIVE" ] || [ "$SVC_STATUS" = "GONE" ] || [ "$SVC_STATUS" = "None" ]; then
                break
              fi
              sleep 15
            done
            SERVICE_EXISTS=""
          fi

          if [ -z "$SERVICE_EXISTS" ]; then
            echo "Creating ECS service with ALB..."
            aws ecs create-service \
              --cluster $ECS_CLUSTER \
              --service-name $ECS_SERVICE \
              --task-definition $ECS_TASK_FAMILY \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$FIRST_SUBNET,$SECOND_SUBNET],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" \
              --load-balancers "targetGroupArn=$TG_ARN,containerName=sentiment-app,containerPort=8000"
          else
            echo "Updating ECS service (ALB already attached)..."
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service $ECS_SERVICE \
              --task-definition $ECS_TASK_FAMILY \
              --force-new-deployment
          fi

          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_ENV
          echo "SG_ID=$SG_ID" >> $GITHUB_ENV
          echo "SUBNETS=$SUBNETS" >> $GITHUB_ENV

      - name: Wait for ECS
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE --no-paginate 2>/dev/null || true
          echo "ECS service stable"

      - name: Setup CloudFront HTTPS
        run: |
          # Check if distribution already exists
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='sentiment-analysis'].Id | [0]" --output text 2>/dev/null || echo "None")

          if [ "$DIST_ID" != "None" ] && [ -n "$DIST_ID" ]; then
            echo "CloudFront distribution exists: $DIST_ID"
            # Update origin IP
            ETAG=$(aws cloudfront get-distribution-config --id "$DIST_ID" --query "ETag" --output text)
            aws cloudfront get-distribution-config --id "$DIST_ID" --query "DistributionConfig" > /tmp/cf-config.json
            # Update the origin domain
            python3 -c "
          import json
          with open('/tmp/cf-config.json') as f:
              cfg = json.load(f)
          cfg['Origins']['Items'][0]['DomainName'] = '${ALB_DNS}'
          with open('/tmp/cf-config-updated.json','w') as f:
              json.dump(cfg, f)
          "
            aws cloudfront update-distribution --id "$DIST_ID" --distribution-config file:///tmp/cf-config-updated.json --if-match "$ETAG" > /dev/null
            echo "Updated CloudFront origin to ${PUBLIC_IP}"
          else
            echo "Creating new CloudFront distribution..."
            cat > /tmp/cf-dist.json << CFEOF
          {
            "CallerReference": "sentiment-$(date +%s)",
            "Comment": "sentiment-analysis",
            "Enabled": true,
            "Origins": {
              "Quantity": 1,
              "Items": [{
                "Id": "ecs-origin",
                "DomainName": "${ALB_DNS}",
                "CustomOriginConfig": {
                  "HTTPPort": 80,
                  "HTTPSPort": 443,
                  "OriginProtocolPolicy": "http-only",
                  "OriginSslProtocols": {"Quantity": 1, "Items": ["TLSv1.2"]}
                }
              }]
            },
            "DefaultCacheBehavior": {
              "TargetOriginId": "ecs-origin",
              "ViewerProtocolPolicy": "redirect-to-https",
              "AllowedMethods": {
                "Quantity": 7,
                "Items": ["GET","HEAD","OPTIONS","PUT","POST","PATCH","DELETE"],
                "CachedMethods": {"Quantity": 2, "Items": ["GET","HEAD"]}
              },
              "ForwardedValues": {
                "QueryString": true,
                "Cookies": {"Forward": "all"},
                "Headers": {"Quantity": 5, "Items": ["Accept","Content-Type","Authorization","Origin","X-Requested-With"]}
              },
              "MinTTL": 0,
              "DefaultTTL": 0,
              "MaxTTL": 0,
              "Compress": true
            },
            "ViewerCertificate": {
              "CloudFrontDefaultCertificate": true
            },
            "PriceClass": "PriceClass_100"
          }
          CFEOF
            RESULT=$(aws cloudfront create-distribution --distribution-config file:///tmp/cf-dist.json)
            DIST_ID=$(echo "$RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin)['Distribution']['Id'])")
            echo "Created CloudFront distribution: $DIST_ID"
          fi

          # Get CloudFront URL
          CF_DOMAIN=$(aws cloudfront get-distribution --id "$DIST_ID" --query "Distribution.DomainName" --output text)
          CF_STATUS=$(aws cloudfront get-distribution --id "$DIST_ID" --query "Distribution.Status" --output text)

          echo ""
          echo "=========================================="
          echo "  DEPLOYMENT SUCCESSFUL!"
          echo ""
          echo "  HTTPS: https://${CF_DOMAIN}"
          echo "  ALB:   http://${ALB_DNS}"
          echo ""
          echo "  CloudFront ID: ${DIST_ID}"
          echo "  CloudFront Status: ${CF_STATUS}"
          echo "=========================================="
          echo ""
          echo "Note: CloudFront may take 5-10 minutes to fully deploy on first creation."
